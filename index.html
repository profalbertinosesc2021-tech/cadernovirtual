<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Nuvem de Planos de Aula - G3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --amber: #d97706;
            --drive-color: #34a853;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; max-width: 1300px; margin-bottom: 20px; text-align: center; }
        header h1 { color: var(--primary); margin-bottom: 5px; }
        header p { color: var(--text-light); }
        
        .container { width: 100%; max-width: 1300px; display: grid; grid-template-columns: 1.11fr 0.89fr; gap: 24px; }
        @media (max-width: 1024px) { .container { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); height: fit-content; }
        .card h2 { margin-bottom: 20px; font-size: 1.4rem; border-bottom: 2px solid var(--border); padding-bottom: 10px; color: var(--primary); }
        
        .form-group { margin-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; color: var(--text); background-color: #fff; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        textarea { resize: vertical; min-height: 80px; }

        .btn { padding: 10px 16px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; display: inline-flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; }
        .btn-primary { background-color: var(--primary); color: white; width: 100%; padding: 14px; font-size: 1rem; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-edit { background-color: var(--amber); color: white; }
        
        .loading-notice { background: #eff6ff; color: #1e40af; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-weight: 600; text-align: center; display: none; }

        .filter-panel { background: #f8fafc; border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .filter-panel h3 { font-size: 0.9rem; color: var(--text-light); margin-bottom: 10px; text-transform: uppercase; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .lista-planos { max-height: 850px; overflow-y: auto; padding-right: 5px; }
        .plano-item { padding: 20px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; background-color: #fafafa; border-left: 4px solid var(--primary); }
        .plano-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px dashed var(--border); padding-bottom: 8px; }
        .plano-title { font-weight: bold; font-size: 1.2rem; color: var(--primary); }
        .plano-meta { font-size: 0.85rem; color: var(--text-light); }
        
        .plano-section { margin-bottom: 12px; font-size: 0.9rem; }
        .plano-section strong { color: #334155; display: block; margin-bottom: 2px; font-size: 0.85rem; text-transform: uppercase; }
        .plano-section p { white-space: pre-line; background: #fff; padding: 8px 12px; border-radius: 6px; border: 1px solid #f1f5f9; }

        .export-panel { background: #f1f5f9; padding: 12px; border-radius: 8px; margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .export-label { width: 100%; font-size: 0.8rem; text-transform: uppercase; color: var(--text-light); font-weight: 700; }
        .btn-export { background-color: #64748b; color: white; font-size: 0.8rem; padding: 6px 12px; flex-grow: 1; }
        .btn-export:hover { background-color: #475569; }

        .item-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border); }
        .no-results { text-align: center; color: var(--text-light); padding: 40px 20px; }
        #print-preview { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Gerenciador Nuvem de Planos de Aula</h1>
        <p>Ambiente Integrado com Google Drive via API Apps Script • Grupo 3 (G3)</p>
    </header>

    <div class="container">
        <div class="card">
            <h2 id="form-title">Criar Plano de Aula</h2>
            <div id="loadingForm" class="loading-notice">Enviando e sincronizando dados no Google Drive...</div>
            <form id="planoForm">
                <input type="hidden" id="planoId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="grupo">Turma / Grupo</label>
                        <input type="text" id="grupo" value="G3" required>
                    </div>
                    <div class="form-group">
                        <label for="trimestre">Trimestre</label>
                        <select id="trimestre">
                            <option value="I">I Trimestre</option>
                            <option value="II">II Trimestre</option>
                            <option value="III">III Trimestre</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="data">Data / Período</label>
                        <input type="text" id="data" placeholder="Ex: 17/02/26" required>
                    </div>
                    <div class="form-group">
                        <label for="tema">Tema da Aula</label>
                        <input type="text" id="tema" placeholder="Ex: Descoberta Sonora" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="direitos">Direitos de Aprendizagem</label>
                    <textarea id="direitos">Conviver – Brincar – Explorar – Expressar – Conhecer-se</textarea>
                </div>

                <div class="form-group">
                    <label for="campos">Campos de Experiência</label>
                    <input type="text" id="campos" value="TRAÇOS, SONS, CORES E FORMAS">
                </div>

                <div class="form-group">
                    <label for="conteudos">Eixos Temáticos / Conteúdos</label>
                    <textarea id="conteudos" placeholder="Ex: Descoberta Sonora..."></textarea>
                </div>

                <div class="form-group">
                    <label for="objetivos">Objetivos de Aprendizagem</label>
                    <textarea id="objetivos" placeholder="Descreva os objetivos..."></textarea>
                </div>

                <div class="form-group">
                    <label for="habilidades">Habilidades / BNCC</label>
                    <textarea id="habilities" placeholder="Ex: (EI02TS01)"></textarea>
                </div>

                <div class="form-group">
                    <label for="momento">Momento / Desenvolvimento Pedagógico</label>
                    <textarea id="momento" style="min-height: 140px;" placeholder="Passo a passo da atividade..."></textarea>
                </div>

                <div class="form-group">
                    <label for="expectativas">Expectativas de Aprendizagem</label>
                    <textarea id="expectativas" placeholder="O que se espera fixar..."></textarea>
                </div>

                <div class="form-group">
                    <label for="recursos">Recursos Didáticos</label>
                    <textarea id="recursos" placeholder="Materiais necessários..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar no Google Drive</button>
            </form>
        </div>

        <div class="card">
            <h2>Planos na Nuvem (Drive)</h2>
            <div id="loadingList" class="loading-notice" style="display: block;">Carregando planos salvos no Google Drive...</div>
            
            <div class="filter-panel">
                <h3>🔍 Filtrar Planos da Nuvem</h3>
                <div class="filter-grid">
                    <div>
                        <label for="filtroTurma" style="font-size: 0.8rem; color: var(--text-light);">Turma</label>
                        <input type="text" id="filtroTurma" placeholder="Filtrar..." oninput="renderizarLista()">
                    </div>
                    <div>
                        <label for="filtroData" style="font-size: 0.8rem; color: var(--text-light);">Data</label>
                        <input type="text" id="filtroData" placeholder="Filtrar..." oninput="renderizarLista()">
                    </div>
                    <div>
                        <label for="filtroTema" style="font-size: 0.8rem; color: var(--text-light);">Tema</label>
                        <input type="text" id="filtroTema" placeholder="Filtrar..." oninput="renderizarLista()">
                    </div>
                </div>
            </div>
            
            <div class="lista-planos" id="listaPlanos"></div>
        </div>
    </div>

    <div id="print-preview"></div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO: INSIRA SUA URL DO APPS SCRIPT ABAIXO
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbxiny4t5fy83ns-d_Q4gPwpyuS6DoIFIgGUcFff1nm9PyAd8Rb2UBFiiX6YX6hmWyg/exec";

        let planos = [];

        // Faz o rastreio e carregamento dos arquivos JSON na pasta do Drive
        async function buscarPlanosDaNuvem() {
            document.getElementById('loadingList').style.display = 'block';
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Erro de resposta");
                
                planos = await response.json();
                renderizarLista();
            } catch (error) {
                console.error(error);
                alert("Erro ao conectar com o Google Drive. Verifique se a URL do Apps Script foi atualizada e implantada corretamente.");
            } finally {
                document.getElementById('loadingList').style.display = 'none';
            }
        }

        // Submissão do Formulário (Salvar Novo ou Modificar Existente)
        document.getElementById('planoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            document.getElementById('loadingForm').style.display = 'block';
            
            const id = document.getElementById('planoId').value;
            const planoObjeto = {
                id: id ? parseInt(id) : Date.now(),
                grupo: document.getElementById('grupo').value,
                trimestre: document.getElementById('trimestre').value,
                data: document.getElementById('data').value,
                tema: document.getElementById('tema').value,
                direitos: document.getElementById('direitos').value,
                campos: document.getElementById('campos').value,
                conteudos: document.getElementById('conteudos').value,
                objetivos: document.getElementById('objetivos').value,
                habilidades: document.getElementById('habilities').value,
                momento: document.getElementById('momento').value,
                expectativas: document.getElementById('expectativas').value,
                recursos: document.getElementById('recursos').value,
            };

            try {
                // Enviado como 'text/plain' para passar pelo CORS do GitHub Pages de forma limpa
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' }, 
                    body: JSON.stringify({ action: "salvar", plano: planoObjeto })
                });

                alert("Operação realizada! O arquivo JSON foi sincronizado na sua pasta do Google Drive.");
                
                // Resetando o formulário para as configurações base
                document.getElementById('planoForm').reset();
                document.getElementById('planoId').value = '';
                document.getElementById('grupo').value = 'G3';
                document.getElementById('direitos').value = 'Conviver – Brincar – Explorar – Expressar – Conhecer-se';
                document.getElementById('campos').value = 'TRAÇOS, SONS, CORES E FORMAS';
                document.getElementById('form-title').innerText = "Criar Plano de Aula";
                document.getElementById('btnSalvar').innerText = "Salvar no Google Drive";

                // Atualiza a visualização do painel lateral buscando as novas informações
                setTimeout(buscarPlanosDaNuvem, 1500);
            } catch (err) {
                console.error(err);
                alert("Falha de conexão ao enviar o arquivo para a nuvem.");
            } finally {
                document.getElementById('loadingForm').style.display = 'none';
            }
        });

        // Renderiza a lista aplicando os 3 filtros combinados (Turma, Data, Tema)
        function renderizarLista() {
            const lista = document.getElementById('listaPlanos');
            const buscaTurma = document.getElementById('filtroTurma').value.toLowerCase();
            const buscaData = document.getElementById('filtroData').value.toLowerCase();
            const buscaTema = document.getElementById('filtroTema').value.toLowerCase();
            lista.innerHTML = '';

            const filtrados = planos.filter(p => {
                return p.grupo.toLowerCase().includes(buscaTurma) && 
                       p.data.toLowerCase().includes(buscaData) && 
                       p.tema.toLowerCase().includes(buscaTema);
            });

            if (filtrados.length === 0) {
                lista.innerHTML = '<div class="no-results">Nenhum plano corresponde aos filtros aplicados ou banco vazio.</div>';
                return;
            }

            filtrados.forEach(p => {
                const box = document.createElement('div');
                box.className = 'plano-item';
                box.innerHTML = `
                    <div class="plano-header">
                        <div class="plano-title">${p.tema}</div>
                        <div class="plano-meta"><strong>Data:</strong> ${p.data}</div>
                    </div>
                    <div class="plano-meta" style="margin-bottom:12px;">
                        <strong>Turma/Grupo:</strong> ${p.grupo} | <strong>Trimestre:</strong> ${p.trimestre}
                    </div>
                    <div class="plano-section"><strong>Conteúdos / Eixos:</strong> <p>${p.conteudos}</p></div>
                    <div class="plano-section"><strong>Habilidades BNCC:</strong> <p>${p.habilidades || ''}</p></div>
                    <div class="plano-section"><strong>Desenvolvimento Pedagógico:</strong> <p>${p.momento}</p></div>
                    
                    <div class="export-panel">
                        <div class="export-label">Exportar Cópia Local:</div>
                        <button class="btn btn-export" onclick="exportarLocal(${p.id}, 'html')">HTML</button>
                        <button class="btn btn-export" onclick="exportarLocal(${p.id}, 'txt')">TXT</button>
                        <button class="btn btn-export" onclick="exportarLocal(${p.id}, 'json')">JSON</button>
                        <button class="btn btn-export" onclick="exportarLocal(${p.id}, 'doc')">WORD</button>
                        <button class="btn btn-export" onclick="exportarLocal(${p.id}, 'pdf')">PDF</button>
                    </div>
                    <div class="item-actions">
                        <button class="btn btn-danger" onclick="deletarPlano(${p.id})">Excluir do Drive</button>
                        <button class="btn btn-edit" onclick="carregarEdicao(${p.id})">Editar Plano</button>
                    </div>
                `;
                lista.appendChild(box);
            });
        }

        // Recupera as informações da nuvem e preenche os campos para alteração
        function carregarEdicao(id) {
            const p = planos.find(item => item.id === id);
            if (!p) return;

            document.getElementById('planoId').value = p.id;
            document.getElementById('grupo').value = p.grupo;
            document.getElementById('trimestre').value = p.trimestre;
            document.getElementById('data').value = p.data;
            document.getElementById('tema').value = p.tema;
            document.getElementById('direitos').value = p.direitos;
            document.getElementById('campos').value = p.campos;
            document.getElementById('conteudos').value = p.conteudos;
            document.getElementById('objetivos').value = p.objetivos;
            document.getElementById('habilities').value = p.habilidades || '';
            document.getElementById('momento').value = p.momento;
            document.getElementById('expectativas').value = p.expectativas;
            document.getElementById('recursos').value = p.recursos;

            document.getElementById('form-title').innerText = "Editando: " + p.tema;
            document.getElementById('btnSalvar').innerText = "Atualizar e Mudar no Drive";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Remove permanentemente o arquivo da pasta da nuvem
        async function deletarPlano(id) {
            if (confirm('Deseja mover permanentemente este arquivo para a lixeira do seu Google Drive?')) {
                document.getElementById('loadingList').style.display = 'block';
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: "deletar", id: id })
                    });
                    setTimeout(buscarPlanosDaNuvem, 1200);
                } catch (err) {
                    alert("Erro ao executar a exclusão na nuvem.");
                }
            }
        }

        // Estrutura de visualização para exportações limpas
        function gerarDocumentoEstruturado(p) {
            return `
                <div style="font-family: Arial, sans-serif; padding: 30px; color: #333; line-height: 1.6; max-width: 800px; margin: auto;">
                    <h1 style="color: #4f46e5; border-bottom: 2px solid #4f46e5; padding-bottom: 5px; margin-bottom: 20px;">PLANO DE AULA: ${p.tema}</h1>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                        <tr>
                            <td style="padding: 8px; border: 1px solid #ddd; background: #f9f9f9;"><strong>Grupo/Turma:</strong> ${p.grupo}</td>
                            <td style="padding: 8px; border: 1px solid #ddd; background: #f9f9f9;"><strong>Trimestre:</strong> ${p.trimestre}</td>
                            <td style="padding: 8px; border: 1px solid #ddd; background: #f9f9f9;"><strong>Data/Período:</strong> ${p.data}</td>
                        </tr>
                    </table>
                    <p><strong>CAMPOS DE EXPERIÊNCIA:</strong> ${p.campos}</p>
                    <hr style="border:0; border-top: 1px dashed #ddd; margin:15px 0;">
                    <p><strong>DIREITOS DE APRENDIZAGEM:</strong><br>${p.direitos.replace(/\n/g, '<br>')}</p>
                    <p><strong>CONTEÚDOS:</strong><br>${p.conteudos.replace(/\n/g, '<br>')}</p>
                    <p><strong>OBJETIVOS:</strong><br>${p.objetivos.replace(/\n/g, '<br>')}</p>
                    <p><strong>HABILIDADES BNCC:</strong><br>${p.habilidades.replace(/\n/g, '<br>')}</p>
                    <p><strong>DESENVOLVIMENTO PEDAGÓGICO:</strong><br>${p.momento.replace(/\n/g, '<br>')}</p>
                    <p><strong>EXPECTATIVAS DE APRENDIZAGEM:</strong><br>${p.expectativas.replace(/\n/g, '<br>')}</p>
                    <p><strong>RECURSOS:</strong><br>${p.recursos.replace(/\n/g, '<br>')}</p>
                </div>`;
        }

        // Geração de downloads locais sob demanda
        function exportarLocal(id, formato) {
            const p = planos.find(item => item.id === id);
            if (!p) return;
            const nomeArquivo = `Plano_${p.tema.replace(/[^a-zA-Z0-9]/g, '_')}`;

            if (formato === 'json') {
                acionarDownload(new Blob([JSON.stringify(p, null, 2)], {type: 'application/json'}), `${nomeArquivo}.json`);
            } else if (formato === 'txt') {
                acionarDownload(new Blob([`PLANO: ${p.tema}\nTurma: ${p.grupo}\nData: ${p.data}\n\nDesenvolvimento:\n${p.momento}`], {type: 'text/plain'}), `${nomeArquivo}.txt`);
            } else if (formato === 'html') {
                acionarDownload(new Blob([`<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>${gerarDocumentoEstruturado(p)}</body></html>`], {type: 'text/html'}), `${nomeArquivo}.html`);
            } else if (formato === 'doc') {
                acionarDownload(new Blob([`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"></head><body>${gerarDocumentoEstruturado(p)}</body></html>`], {type: 'application/msword'}), `${nomeArquivo}.doc`);
            } else if (formato === 'pdf') {
                const preview = document.getElementById('print-preview');
                preview.style.display = 'block'; preview.innerHTML = gerarDocumentoEstruturado(p);
                html2pdf().set({ margin: 15, filename: `${nomeArquivo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { format: 'a4', orientation: 'portrait' } }).from(preview).save().then(() => { preview.style.display = 'none'; });
            }
        }

        function acionarDownload(blob, nome) {
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = nome; a.click(); URL.revokeObjectURL(a.href);
        }

        // Executado de forma automática assim que carregar o script da página
        buscarPlanosDaNuvem();
    </script>
</body>
</html>
