    <!-- ============================================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================================ -->
    <script>
        // ================================================================
        // CONFIGURAÇÕES
        // ================================================================
        const TURMAS = ['G3', 'G4', 'G5', '1A', '2A', '3A', '4A', '5A'];
        const TRIMESTRES = ['I', 'II', 'III'];
        const CAMPOS_EXPERIENCIA = [
            'NENHUM',
            'TRAÇOS, SONS, CORES E FORMAS',
            'O EU, O OUTRO E O NÓS',
            'CORPO, GESTOS E MOVIMENTOS',
            'ESPAÇO, TEMPO, QUANTIDADES, RELAÇÕES E TRANSFORMAÇÕES',
            'ESCUTA, FALA, PENSAMENTO E IMAGINAÇÃO'
        ];

        // ================================================================
        // URL DO APPS SCRIPT - SUBSTITUA PELA SUA!
        // ================================================================
        const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwsPYoUwRcLD1oHuF_xAPwzzLma5YKHb9O0W4CayycsPZF678stHrL_8XQpjXejHIY/exec';

        // ================================================================
        // ESTADO
        // ================================================================
        let plans = [];
        let currentPlanId = null;
        let editingId = null;
        let deleteTargetId = null;
        let driveConnected = false;
        let driveFileMap = {};

        // ================================================================
        // INICIALIZAÇÃO
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadLocalPlans();

            const driveConnectedStorage = localStorage.getItem('drive_connected');
            if (driveConnectedStorage === 'true') {
                driveConnected = true;
                updateDriveStatus();
                // Não carregar automaticamente para evitar timeout
            }
        });

        // ================================================================
        // LOADING OVERLAY
        // ================================================================
        function showLoading(text = 'Carregando...') {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        // ================================================================
        // COMUNICAÇÃO COM APPS SCRIPT - VERSÃO SIMPLIFICADA
        // ================================================================
        async function callAppsScript(action, data = {}) {
            try {
                const payload = {
                    action: action,
                    ...data
                };

                // Usar fetch com modo normal (não no-cors)
                const response = await fetch(APP_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error('Erro na requisição: ' + response.status);
                }

                const result = await response.json();
                return result;

            } catch (error) {
                console.error('Erro ao chamar Apps Script:', error);
                // Se falhar, tentar método alternativo com iframe
                return await callAppsScriptFallback(action, data);
            }
        }

        // Método fallback usando iframe
        function callAppsScriptFallback(action, data) {
            return new Promise((resolve, reject) => {
                const callbackName = 'callback_' + Date.now();

                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                document.body.appendChild(iframe);

                const params = new URLSearchParams();
                params.append('action', action);
                params.append('data', JSON.stringify(data));
                params.append('callback', callbackName);

                const url = APP_SCRIPT_URL + '?' + params.toString();

                window[callbackName] = function(response) {
                    delete window[callbackName];
                    if (document.body.contains(iframe)) {
                        document.body.removeChild(iframe);
                    }
                    if (response && response.success) {
                        resolve(response.data);
                    } else {
                        reject(new Error(response ? response.error : 'Erro desconhecido'));
                    }
                };

                iframe.src = url;

                setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        if (document.body.contains(iframe)) {
                            document.body.removeChild(iframe);
                        }
                        reject(new Error('Timeout ao comunicar com o Apps Script'));
                    }
                }, 15000);
            });
        }

        // ================================================================
        // CONECTAR AO DRIVE VIA APPS SCRIPT
        // ================================================================
        function connectDrive() {
            showLoading('Conectando ao Google Drive...');

            const authUrl = APP_SCRIPT_URL + '?action=auth';
            const authWindow = window.open(authUrl, '_blank', 'width=500,height=600');

            // Verificar conexão após alguns segundos
            setTimeout(async () => {
                try {
                    // Tentar listar para verificar conexão
                    const result = await callAppsScript('list');
                    if (result && Array.isArray(result)) {
                        driveConnected = true;
                        localStorage.setItem('drive_connected', 'true');
                        updateDriveStatus();
                        hideLoading();
                        showToast('✅ Conectado ao Google Drive!', 'success');
                        document.getElementById('driveStatusMsg').textContent = '✅ Conectado com sucesso!';

                        // Carregar planos
                        plans = result;
                        saveLocalPlans();
                        renderPlansList();
                        updateStats();
                        if (plans.length > 0) {
                            viewPlan(plans[0].id);
                        }
                    } else {
                        throw new Error('Falha ao listar planos');
                    }
                } catch (error) {
                    hideLoading();
                    showToast('Erro ao conectar: ' + error.message, 'error');
                    document.getElementById('driveStatusMsg').textContent = '❌ Erro: ' + error.message;
                }
            }, 5000);
        }

        function updateDriveStatus() {
            const dot = document.getElementById('driveDot');
            const text = document.getElementById('driveStatusText');

            if (driveConnected) {
                dot.className = 'dot online';
                text.textContent = 'Drive Online';
            } else {
                dot.className = 'dot offline';
                text.textContent = 'Desconectado';
            }
        }

        function toggleDriveConfig() {
            const config = document.getElementById('driveConfig');
            config.classList.toggle('show');
        }

        // ================================================================
        // CARREGAR PLANOS DO DRIVE VIA APPS SCRIPT
        // ================================================================
        async function loadPlansFromDrive() {
            if (!driveConnected) {
                loadLocalPlans();
                return;
            }

            showLoading('Carregando planos do Google Drive...');

            try {
                const result = await callAppsScript('list');

                if (result && Array.isArray(result)) {
                    plans = result;
                    saveLocalPlans();
                    renderPlansList();
                    showToast(`✅ ${plans.length} planos carregados do Drive!`, 'success');
                    document.getElementById('driveStatusMsg').textContent = `✅ ${plans.length} planos carregados`;
                } else {
                    showToast('Nenhum plano encontrado no Drive.', 'info');
                    loadLocalPlans();
                }

                hideLoading();
                updateStats();

                if (plans.length > 0 && !currentPlanId) {
                    viewPlan(plans[0].id);
                }

            } catch (error) {
                hideLoading();
                console.error('Erro ao carregar do Drive:', error);
                showToast('Erro ao carregar do Drive: ' + error.message, 'error');
                loadLocalPlans();
            }
        }

        // ================================================================
        // SALVAR PLANOS NO DRIVE VIA APPS SCRIPT
        // ================================================================
        async function saveAllToDrive() {
            if (!driveConnected) {
                showToast('Conecte-se ao Google Drive primeiro.', 'warning');
                toggleDriveConfig();
                return;
            }

            if (plans.length === 0) {
                showToast('Não há planos para salvar.', 'warning');
                return;
            }

            showLoading('Salvando planos no Google Drive...');

            try {
                const result = await callAppsScript('saveAll', { plans: plans });

                if (result && Array.isArray(result)) {
                    const saved = result.filter(r => r.success).length;
                    const errors = result.filter(r => !r.success).length;

                    if (errors === 0) {
                        showToast(`✅ ${saved} planos salvos no Google Drive!`, 'success');
                        document.getElementById('driveStatusMsg').textContent =
                            `✅ Último salvamento: ${new Date().toLocaleString('pt-BR')}`;
                    } else {
                        showToast(`⚠️ ${saved} salvos, ${errors} com erro.`, 'warning');
                    }
                } else {
                    showToast('Erro ao salvar planos.', 'error');
                }

                hideLoading();
                saveLocalPlans();

            } catch (error) {
                hideLoading();
                console.error('Erro ao salvar no Drive:', error);
                showToast('Erro ao salvar no Drive: ' + error.message, 'error');
            }
        }

        // ================================================================
        // SINCRONIZAR
        // ================================================================
        function syncFromDrive() {
            if (!driveConnected) {
                showToast('Conecte-se ao Google Drive primeiro.', 'warning');
                toggleDriveConfig();
                return;
            }

            showLoading('Sincronizando com o Google Drive...');

            const savePromise = plans.length > 0 ? saveAllToDrive() : Promise.resolve();

            savePromise.then(() => {
                loadPlansFromDrive();
            }).catch(() => {
                loadPlansFromDrive();
            });
        }

        // ================================================================
        // CRUD - LOCALSTORAGE (backup local)
        // ================================================================
        function loadLocalPlans() {
            const stored = localStorage.getItem('plans_all');
            if (stored) {
                try {
                    plans = JSON.parse(stored);
                } catch (e) {
                    plans = [];
                }
            } else {
                plans = getSamplePlans();
                saveLocalPlans();
            }
            updateStats();
            renderPlansList();
            if (plans.length > 0 && !currentPlanId) {
                viewPlan(plans[0].id);
            }
        }

        function saveLocalPlans() {
            localStorage.setItem('plans_all', JSON.stringify(plans));
            updateStats();
            updateResultCount();
        }

        function getSamplePlans() {
            const sampleData = {
                grupo: 'G3',
                trimestre: 'I',
                data: '17/02/25',
                tema: 'Descoberta Sonora – Sons de Instrumentos',
                professor: 'Maria Silva',
                direitosAprendizagem: 'Conviver – Brincar – Explorar – Expressar – Conhecer-se',
                campoExperiencia: 'TRAÇOS, SONS, CORES E FORMAS',
                eixosConteudos: 'Sons de Instrumentos: Explorar diferentes instrumentos musicais. Percussão: caxixi, pandeiro, tambor, agogô, chocalho, xilofone. Cordas: violão.',
                objetivos: 'Utilizar diferentes fontes sonoras disponíveis no ambiente em brincadeiras cantadas, canções, músicas e melodias.',
                habilidades: '(EI02TS01) Criar sons com materiais, objetos e instrumentos musicais.\n(EI02TS03) Utilizar diferentes fontes sonoras.',
                momento: 'Acolhida: Conhecer a sala de música e os instrumentos.\nExplorar os instrumentos na sala de aula.',
                expectativas: 'Escuta e relaciona sons da natureza ou da cultura.',
                recursos: 'Instrumentos musicais diversos: percussão, sopro, cordas.',
                outrasInformacoes: ''
            };

            return [
                { ...sampleData, id: generateId(), createdAt: new Date().toISOString(), updatedAt: new Date()
                        .toISOString() },
                {
                    ...sampleData,
                    id: generateId(),
                    grupo: 'G4',
                    tema: 'Brincando com Ritmos - G4',
                    data: '24/02/25',
                    trimestre: 'I',
                    professor: 'Carlos Santos',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                },
                {
                    ...sampleData,
                    id: generateId(),
                    grupo: '1A',
                    tema: 'Introdução à Notação Musical - 1A',
                    data: '03/03/25',
                    trimestre: 'I',
                    professor: 'Ana Oliveira',
                    campoExperiencia: 'TRAÇOS, SONS, CORES E FORMAS',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                }
            ];
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2, 8);
        }

        // ================================================================
        // CRUD - OPERAÇÕES
        // ================================================================
        function createPlan(data) {
            const newPlan = {
                id: generateId(),
                ...data,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            plans.unshift(newPlan);
            saveLocalPlans();
            renderPlansList();

            if (driveConnected) {
                callAppsScript('save', { plan: newPlan }).catch(err => {
                    console.error('Erro ao salvar no Drive:', err);
                });
            }

            return newPlan;
        }

        function updatePlan(id, data) {
            const index = plans.findIndex(p => p.id === id);
            if (index !== -1) {
                plans[index] = {
                    ...plans[index],
                    ...data,
                    updatedAt: new Date().toISOString()
                };
                saveLocalPlans();
                renderPlansList();

                if (driveConnected) {
                    callAppsScript('save', { plan: plans[index] }).catch(err => {
                        console.error('Erro ao atualizar no Drive:', err);
                    });
                }

                return plans[index];
            }
            return null;
        }

        function deletePlan(id) {
            if (driveConnected) {
                callAppsScript('delete', { id: id }).catch(err => {
                    console.error('Erro ao excluir do Drive:', err);
                });
            }

            plans = plans.filter(p => p.id !== id);
            saveLocalPlans();
            renderPlansList();

            if (currentPlanId === id) {
                currentPlanId = null;
                editingId = null;
                newPlan();
            }
            showToast('Plano excluído com sucesso!', 'success');
        }

        function getPlan(id) {
            return plans.find(p => p.id === id);
        }

        // ================================================================
        // RENDERIZAÇÃO - LISTA
        // ================================================================
        function renderPlansList(filteredPlans) {
            const list = document.getElementById('plansList');
            const items = filteredPlans || plans;

            if (items.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <h3>Nenhum plano encontrado</h3>
                        <p>Clique em "Novo" para começar a criar seus planos de aula.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = items.map(plan => {
                const badgeClass = getBadgeClass(plan.grupo);
                const isActive = plan.id === currentPlanId;
                const driveIcon = driveConnected ? '☁️' : '';
                return `
                    <div class="plan-item ${isActive ? 'active' : ''}" onclick="viewPlan('${plan.id}')">
                        <div class="plan-info">
                            <h3>${escapeHtml(plan.tema || 'Sem título')} ${driveIcon}</h3>
                            <p>
                                <span class="badge ${badgeClass}">${escapeHtml(plan.grupo || '')}</span>
                                ${escapeHtml(plan.trimestre || '')} • ${escapeHtml(plan.data || '')}
                                ${plan.professor ? `• 👨‍🏫 ${escapeHtml(plan.professor)}` : ''}
                            </p>
                        </div>
                        <div class="plan-actions" onclick="event.stopPropagation();">
                            <button class="btn btn-primary btn-xs" onclick="editPlan('${plan.id}')">✏️</button>
                            <button class="btn btn-danger btn-xs" onclick="confirmDelete('${plan.id}')">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');

            updateResultCount(items.length);
            updateStats();
        }

        function getBadgeClass(grupo) {
            const map = {
                'G3': 'badge-g3',
                'G4': 'badge-g4',
                'G5': 'badge-g5',
                '1A': 'badge-1a',
                '2A': 'badge-2a',
                '3A': 'badge-3a',
                '4A': 'badge-4a',
                '5A': 'badge-5a'
            };
            return map[grupo] || '';
        }

        function updateResultCount(count) {
            const el = document.getElementById('resultCount');
            if (el) {
                const total = plans.length;
                el.textContent = count === total ? `${total} planos` : `${count} de ${total} planos`;
            }
        }

        function updateStats() {
            document.getElementById('totalPlans').textContent = plans.length;
            const turmas = new Set(plans.map(p => p.grupo).filter(Boolean));
            document.getElementById('turmasCount').textContent = turmas.size;
        }

        // ================================================================
        // RENDERIZAÇÃO - FORMULÁRIO
        // ================================================================
        function renderForm(plan) {
            const container = document.getElementById('formContainer');
            const isEditing = !!editingId;

            if (!plan) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">👀</div>
                        <h3>Selecione um plano</h3>
                        <p>Clique em um plano na lista ou crie um novo.</p>
                    </div>
                `;
                return;
            }

            const title = isEditing ? '✏️ Editando Plano' : '📋 Visualizando Plano';

            const turmasOptions = TURMAS.map(t =>
                `<option value="${t}" ${plan.grupo === t ? 'selected' : ''}>${t}</option>`
            ).join('');

            const trimestresOptions = TRIMESTRES.map(t =>
                `<option value="${t}" ${plan.trimestre === t ? 'selected' : ''}>Trimestre ${t}</option>`
            ).join('');

            const camposOptions = CAMPOS_EXPERIENCIA.map(c =>
                `<option value="${c}" ${plan.campoExperiencia === c ? 'selected' : ''}>${c}</option>`
            ).join('');

            container.innerHTML = `
                <div class="card-header">
                    <h2>${title}</h2>
                    ${!isEditing ? `
                        <div style="display:flex; gap:5px; flex-wrap:wrap;">
                            <button class="btn btn-primary btn-sm" onclick="editPlan('${plan.id}')">✏️ Editar</button>
                            <button class="btn btn-secondary btn-sm" onclick="exportPlan('html')">📤 Exportar</button>
                            ${driveConnected ? `<span style="font-size:11px;color:var(--gray);">☁️ Drive</span>` : ''}
                        </div>
                    ` : ''}
                </div>
                <form id="planForm" onsubmit="handleSubmit(event)">
                    <input type="hidden" id="planId" value="${plan.id || ''}" />

                    <div class="form-row">
                        <div class="form-group">
                            <label>Turma <span class="required">*</span></label>
                            <select id="fGrupo" ${!isEditing ? 'disabled' : ''}>
                                ${turmasOptions}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Trimestre <span class="required">*</span></label>
                            <select id="fTrimestre" ${!isEditing ? 'disabled' : ''}>
                                ${trimestresOptions}
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Data <span class="required">*</span></label>
                            <input type="text" id="fData" value="${escapeHtml(plan.data || '')}" ${!isEditing ? 'disabled' : ''} placeholder="Ex: 17/02/25" />
                        </div>
                        <div class="form-group">
                            <label>Professor(a)</label>
                            <input type="text" id="fProfessor" value="${escapeHtml(plan.professor || '')}" ${!isEditing ? 'disabled' : ''} placeholder="Nome do professor" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Tema da Aula <span class="required">*</span></label>
                        <input type="text" id="fTema" value="${escapeHtml(plan.tema || '')}" ${!isEditing ? 'disabled' : ''} placeholder="Ex: Descoberta Sonora" />
                    </div>

                    <div class="form-group">
                        <label>Direitos de Aprendizagem</label>
                        <input type="text" id="fDireitos" value="${escapeHtml(plan.direitosAprendizagem || '')}" ${!isEditing ? 'disabled' : ''} placeholder="Ex: Conviver – Brincar – Explorar" />
                    </div>

                    <div class="form-group">
                        <label>Campo de Experiência <span class="required">*</span></label>
                        <select id="fCampo" ${!isEditing ? 'disabled' : ''}>
                            ${camposOptions}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Eixos Temáticos/Conteúdos</label>
                        <textarea id="fEixos" class="medium" ${!isEditing ? 'disabled' : ''} placeholder="Descreva os eixos temáticos e conteúdos...">${escapeHtml(plan.eixosConteudos || '')}</textarea>
                    </div>

                    <div class="form-group">
                        <label>Objetivos de Aprendizagem</label>
                        <textarea id="fObjetivos" class="medium" ${!isEditing ? 'disabled' : ''} placeholder="Descreva os objetivos...">${escapeHtml(plan.objetivos || '')}</textarea>
                    </div>

                    <div class="form-group">
                        <label>Habilidades / BNCC</label>
                        <textarea id="fHabilidades" class="medium" ${!isEditing ? 'disabled' : ''} placeholder="Ex: (EI02TS01) Criar sons...">${escapeHtml(plan.habilidades || '')}</textarea>
                    </div>

                    <div class="form-group">
                        <label>Momento</label>
                        <textarea id="fMomento" class="large" ${!isEditing ? 'disabled' : ''} placeholder="Descreva o momento da aula...">${escapeHtml(plan.momento || '')}</textarea>
                    </div>

                    <div class="form-group">
                        <label>Expectativas de Aprendizagem</label>
                        <textarea id="fExpectativas" class="medium" ${!isEditing ? 'disabled' : ''} placeholder="Expectativas de aprendizagem...">${escapeHtml(plan.expectativas || '')}</textarea>
                    </div>

                    <div class="form-group">
                        <label>Recursos</label>
                        <textarea id="fRecursos" class="medium" ${!isEditing ? 'disabled' : ''} placeholder="Liste os recursos necessários...">${escapeHtml(plan.recursos || '')}</textarea>
                    </div>

                    <div class="form-group">
                        <label>Outras Informações</label>
                        <textarea id="fOutras" class="medium" ${!isEditing ? 'disabled' : ''} placeholder="Observações adicionais, adaptações, etc...">${escapeHtml(plan.outrasInformacoes || '')}</textarea>
                    </div>

                    ${isEditing ? `
                        <div class="form-actions">
                            <button type="submit" class="btn btn-success">💾 Salvar Plano</button>
                            <button type="button" class="btn btn-secondary" onclick="viewPlan('${plan.id}')">Cancelar</button>
                        </div>
                    ` : ''}

                    ${!isEditing ? `
                        <div style="margin-top:8px; font-size:12px; color:var(--gray);">
                            Criado em: ${formatDate(plan.createdAt)} | Atualizado: ${formatDate(plan.updatedAt)}
                            ${driveConnected ? ' | ☁️ No Drive' : ''}
                        </div>
                    ` : ''}
                </form>
            `;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            } catch {
                return '-';
            }
        }

        // ================================================================
        // AÇÕES DO USUÁRIO
        // ================================================================
        function newPlan() {
            editingId = 'new';
            currentPlanId = null;
            const emptyPlan = {
                id: '',
                grupo: 'G3',
                trimestre: 'I',
                data: '',
                tema: '',
                professor: '',
                direitosAprendizagem: '',
                campoExperiencia: 'NENHUM',
                eixosConteudos: '',
                objetivos: '',
                habilidades: '',
                momento: '',
                expectativas: '',
                recursos: '',
                outrasInformacoes: '',
                createdAt: '',
                updatedAt: ''
            };
            renderForm(emptyPlan);
            document.querySelector('#formContainer .card-header h2').textContent = '📝 Novo Plano de Aula';
            setTimeout(() => {
                const firstInput = document.querySelector('#planForm input:not([type="hidden"])');
                if (firstInput) firstInput.focus();
            }, 100);
        }

        function viewPlan(id) {
            const plan = getPlan(id);
            if (!plan) {
                showToast('Plano não encontrado!', 'error');
                return;
            }
            currentPlanId = id;
            editingId = null;
            renderForm(plan);
            document.querySelectorAll('.plan-item').forEach(el => el.classList.remove('active'));
            const items = document.querySelectorAll('.plan-item');
            items.forEach(el => {
                if (el.querySelector('.plan-info h3')?.textContent.includes(plan.tema)) {
                    el.classList.add('active');
                }
            });
        }

        function editPlan(id) {
            const plan = getPlan(id);
            if (!plan) {
                showToast('Plano não encontrado!', 'error');
                return;
            }
            editingId = id;
            currentPlanId = id;
            renderForm(plan);
            document.querySelector('#formContainer .card-header h2').textContent = '✏️ Editando Plano';
        }

        function handleSubmit(event) {
            event.preventDefault();
            const id = document.getElementById('planId')?.value || '';

            const data = {
                grupo: document.getElementById('fGrupo')?.value || 'G3',
                trimestre: document.getElementById('fTrimestre')?.value || 'I',
                data: document.getElementById('fData')?.value || '',
                tema: document.getElementById('fTema')?.value || '',
                professor: document.getElementById('fProfessor')?.value || '',
                direitosAprendizagem: document.getElementById('fDireitos')?.value || '',
                campoExperiencia: document.getElementById('fCampo')?.value || '',
                eixosConteudos: document.getElementById('fEixos')?.value || '',
                objetivos: document.getElementById('fObjetivos')?.value || '',
                habilidades: document.getElementById('fHabilidades')?.value || '',
                momento: document.getElementById('fMomento')?.value || '',
                expectativas: document.getElementById('fExpectativas')?.value || '',
                recursos: document.getElementById('fRecursos')?.value || '',
                outrasInformacoes: document.getElementById('fOutras')?.value || ''
            };

            if (!data.tema) {
                showToast('Por favor, preencha o Tema da Aula.', 'error');
                document.getElementById('fTema')?.focus();
                return;
            }

            if (!data.data) {
                showToast('Por favor, preencha a Data.', 'error');
                document.getElementById('fData')?.focus();
                return;
            }

            let result;
            if (id && id !== 'new') {
                result = updatePlan(id, data);
                showToast('Plano atualizado com sucesso!', 'success');
            } else {
                result = createPlan(data);
                showToast('Plano criado com sucesso!', 'success');
            }

            if (result) {
                editingId = null;
                currentPlanId = result.id;
                renderPlansList();
                viewPlan(result.id);
            }
        }

        function confirmDelete(id) {
            deleteTargetId = id;
            document.getElementById('confirmModal').classList.add('active');
            document.getElementById('confirmDeleteBtn').onclick = function() {
                if (deleteTargetId) {
                    deletePlan(deleteTargetId);
                    deleteTargetId = null;
                }
                closeModal();
            };
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
            deleteTargetId = null;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ================================================================
        // BUSCA E FILTROS
        // ================================================================
        function searchPlans() {
            applyFilters();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterTurma').value = '';
            document.getElementById('filterData').value = '';
            document.getElementById('filterTema').value = '';
            document.getElementById('filterTrimestre').value = '';
            renderPlansList(plans);
        }

        function applyFilters() {
            const turma = document.getElementById('filterTurma').value;
            const data = document.getElementById('filterData').value;
            const tema = document.getElementById('filterTema').value.toLowerCase().trim();
            const trimestre = document.getElementById('filterTrimestre').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

            let filtered = plans;

            if (turma) {
                filtered = filtered.filter(p => p.grupo === turma);
            }

            if (data) {
                const [year, month, day] = data.split('-');
                const dataFormatada = `${day}/${month}/${year.slice(-2)}`;
                filtered = filtered.filter(p => p.data === dataFormatada);
            }

            if (trimestre) {
                filtered = filtered.filter(p => p.trimestre === trimestre);
            }

            if (tema) {
                filtered = filtered.filter(p => (p.tema || '').toLowerCase().includes(tema));
            }

            if (searchTerm) {
                filtered = filtered.filter(p =>
                    (p.tema || '').toLowerCase().includes(searchTerm) ||
                    (p.eixosConteudos || '').toLowerCase().includes(searchTerm) ||
                    (p.objetivos || '').toLowerCase().includes(searchTerm) ||
                    (p.professor || '').toLowerCase().includes(searchTerm) ||
                    (p.outrasInformacoes || '').toLowerCase().includes(searchTerm)
                );
            }

            renderPlansList(filtered);
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') searchPlans();
        });

        // ================================================================
        // EXPORTAR
        // ================================================================
        function toggleExportMenu() {
            const menu = document.getElementById('exportMenu');
            menu.classList.toggle('show');
        }

        function exportPlan(format) {
            const plan = currentPlanId ? getPlan(currentPlanId) : null;
            if (!plan && format !== 'json') {
                showToast('Selecione um plano para exportar.', 'warning');
                return;
            }

            let content = '';
            let filename = '';
            let mimeType = '';

            switch (format) {
                case 'html':
                    content = generateHTMLTable(plan);
                    filename =
                        `plano_${plan.grupo}_${plan.data.replace(/\//g, '')}_${plan.tema.substring(0, 20)}.html`;
                    mimeType = 'text/html';
                    break;
                case 'txt':
                    content = generateTXT(plan);
                    filename =
                        `plano_${plan.grupo}_${plan.data.replace(/\//g, '')}_${plan.tema.substring(0, 20)}.txt`;
                    mimeType = 'text/plain';
                    break;
                case 'json':
                    const exportData = plan ? [plan] : plans;
                    content = JSON.stringify(exportData, null, 2);
                    filename = plan ?
                        `plano_${plan.grupo}_${plan.data.replace(/\//g, '')}_${plan.tema.substring(0, 20)}.json` :
                        `todos_planos_${new Date().toISOString().split('T')[0]}.json`;
                    mimeType = 'application/json';
                    break;
                case 'doc':
                    content = generateDOC(plan);
                    filename =
                        `plano_${plan.grupo}_${plan.data.replace(/\//g, '')}_${plan.tema.substring(0, 20)}.doc`;
                    mimeType = 'application/msword';
                    break;
                case 'pdf':
                    const htmlContent = generateHTMLTable(plan);
                    const printWindow = window.open('', '_blank', 'width=800,height=600');
                    if (printWindow) {
                        printWindow.document.write(`
                            <!DOCTYPE html>
                            <html>
                            <head><title>${plan.tema}</title>
                            <style>
                                body { font-family: Arial, sans-serif; padding: 30px; max-width: 900px; margin: 0 auto; background: white; }
                                .plan-table-export { width: 100%; border-collapse: collapse; font-size: 12px; }
                                .plan-table-export td { padding: 8px 12px; border: 1px solid #d0d7de; vertical-align: top; line-height: 1.5; }
                                .plan-table-export .label-cell { font-weight: 700; background: #f6f8fa; width: 22%; }
                                .plan-table-export .header-row td { background: #1f2937; color: white; font-size: 18px; font-weight: 700; text-align: center; padding: 15px; border: none; }
                                .plan-table-export .subheader-row td { background: #f0f4f8; font-size: 13px; padding: 6px 12px; }
                                .plan-footer { text-align: center; font-size: 10px; color: #95A5A6; margin-top: 15px; border-top: 1px solid #e5e7eb; padding-top: 8px; }
                                .content-cell { white-space: pre-wrap; }
                            </style>
                            </head>
                            <body>${htmlContent}</body>
                            </html>
                        `);
                        printWindow.document.close();
                        printWindow.focus();
                        printWindow.print();
                        showToast('PDF gerado! Use o comando de impressão do navegador.', 'success');
                    } else {
                        showToast('Erro ao abrir janela de impressão.', 'error');
                    }
                    return;
                default:
                    showToast('Formato não suportado.', 'error');
                    return;
            }

            downloadFile(content, filename, mimeType);
            showToast(`Exportado como ${format.toUpperCase()}!`, 'success');
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType + ';charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ================================================================
        // GERADORES DE CONTEÚDO
        // ================================================================
        function generateHTMLTable(plan) {
            const rows = [
                { label: 'Turma', value: plan.grupo },
                { label: 'Trimestre', value: plan.trimestre },
                { label: 'Data', value: plan.data },
                { label: 'Professor(a)', value: plan.professor || '-' },
                { label: 'Direitos de Aprendizagem', value: plan.direitosAprendizagem || '-' },
                { label: 'Campo de Experiência', value: plan.campoExperiencia || '-' },
                { label: 'Eixos Temáticos/Conteúdos', value: plan.eixosConteudos || '-' },
                { label: 'Objetivos de Aprendizagem', value: plan.objetivos || '-' },
                { label: 'Habilidades / BNCC', value: plan.habilidades || '-' },
                { label: 'Momento', value: plan.momento || '-' },
                { label: 'Expectativas de Aprendizagem', value: plan.expectativas || '-' },
                { label: 'Recursos', value: plan.recursos || '-' },
                { label: 'Outras Informações', value: plan.outrasInformacoes || '-' }
            ];

            let rowsHtml = rows.map(row => `
                <tr>
                    <td class="label-cell">${escapeHtml(row.label)}</td>
                    <td class="content-cell">${escapeHtml(row.value)}</td>
                </tr>
            `).join('');

            return `
                <table class="plan-table-export">
                    <tr class="header-row">
                        <td colspan="2">📚 PLANO DE AULA - ${escapeHtml(plan.grupo)}</td>
                    </tr>
                    <tr class="subheader-row">
                        <td colspan="2">
                            <span class="info-item"><strong>Tema:</strong> ${escapeHtml(plan.tema)}</span>
                            ${plan.professor ? `<span class="info-item"><strong>Professor:</strong> ${escapeHtml(plan.professor)}</span>` : ''}
                        </td>
                    </tr>
                    ${rowsHtml}
                    <tr>
                        <td colspan="2" style="text-align:center; font-size:11px; color:#95A5A6; padding:8px; background:#f9f9f9;">
                            Gerado em: ${new Date().toLocaleString('pt-BR')}
                        </td>
                    </tr>
                </table>
                <div class="plan-footer">
                    Plano de Aula - Sistema de Planos de Aula | Educação Infantil e Fundamental
                </div>
            `;
        }

        function generateTXT(plan) {
            const lines = [];
            const separator = '='.repeat(70);

            lines.push(separator);
            lines.push(`PLANO DE AULA - ${plan.grupo}`);
            lines.push(separator);
            lines.push(`Tema: ${plan.tema}`);
            lines.push(`Turma: ${plan.grupo} | Trimestre: ${plan.trimestre} | Data: ${plan.data}`);
            lines.push(`Professor(a): ${plan.professor || '-'}`);
            lines.push(`Campo de Experiência: ${plan.campoExperiencia}`);
            lines.push(separator);

            const sections = [
                { title: 'DIREITOS DE APRENDIZAGEM', value: plan.direitosAprendizagem },
                { title: 'EIXOS TEMÁTICOS/CONTEÚDOS', value: plan.eixosConteudos },
                { title: 'OBJETIVOS DE APRENDIZAGEM', value: plan.objetivos },
                { title: 'HABILIDADES / BNCC', value: plan.habilidades },
                { title: 'MOMENTO', value: plan.momento },
                { title: 'EXPECTATIVAS DE APRENDIZAGEM', value: plan.expectativas },
                { title: 'RECURSOS', value: plan.recursos },
                { title: 'OUTRAS INFORMAÇÕES', value: plan.outrasInformacoes }
            ];

            sections.forEach(s => {
                if (s.value) {
                    lines.push(`\n${s.title}:`);
                    lines.push(s.value);
                }
            });

            lines.push('\n' + separator);
            lines.push(`Gerado em: ${new Date().toLocaleString('pt-BR')}`);
            lines.push(separator);

            return lines.join('\n');
        }

        function generateDOC(plan) {
            const rows = [
                { label: 'Turma', value: plan.grupo },
                { label: 'Trimestre', value: plan.trimestre },
                { label: 'Data', value: plan.data },
                { label: 'Professor(a)', value: plan.professor || '-' },
                { label: 'Direitos de Aprendizagem', value: plan.direitosAprendizagem || '-' },
                { label: 'Campo de Experiência', value: plan.campoExperiencia || '-' },
                { label: 'Eixos Temáticos/Conteúdos', value: plan.eixosConteudos || '-' },
                { label: 'Objetivos de Aprendizagem', value: plan.objetivos || '-' },
                { label: 'Habilidades / BNCC', value: plan.habilidades || '-' },
                { label: 'Momento', value: plan.momento || '-' },
                { label: 'Expectativas de Aprendizagem', value: plan.expectativas || '-' },
                { label: 'Recursos', value: plan.recursos || '-' },
                { label: 'Outras Informações', value: plan.outrasInformacoes || '-' }
            ];

            let rowsHtml = rows.map(row => `
                <tr>
                    <td style="font-weight:700; background:#f6f8fa; padding:8px 12px; border:1px solid #d0d7de; width:25%;">${escapeHtml(row.label)}</td>
                    <td style="padding:8px 12px; border:1px solid #d0d7de; white-space:pre-wrap;">${escapeHtml(row.value)}</td>
                </tr>
            `).join('');

            return `
                <html xmlns:o='urn:schemas-microsoft-com:office:office'
                      xmlns:w='urn:schemas-microsoft-com:office:word'
                      xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset="utf-8">
                    <title>Plano de Aula</title>
                    <style>
                        body { font-family: Arial, sans-serif; font-size: 12pt; padding: 20px; }
                        h1 { color: #2C6EAB; font-size: 20pt; text-align: center; }
                        .table { width: 100%; border-collapse: collapse; margin-top: 15px; }
                        .table td { padding: 8px 12px; border: 1px solid #d0d7de; vertical-align: top; }
                        .label { font-weight: 700; background: #f6f8fa; width: 25%; }
                        .content { white-space: pre-wrap; }
                        .footer { text-align: center; font-size: 10pt; color: #95A5A6; margin-top: 20px; border-top: 1px solid #e5e7eb; padding-top: 10px; }
                        .tema { font-size: 14pt; font-weight: 700; text-align: center; margin: 10px 0; color: #2C6EAB; }
                    </style>
                </head>
                <body>
                    <h1>📚 PLANO DE AULA - ${escapeHtml(plan.grupo)}</h1>
                    <div class="tema">${escapeHtml(plan.tema)}</div>
                    ${plan.professor ? `<p style="text-align:center;"><strong>Professor(a):</strong> ${escapeHtml(plan.professor)}</p>` : ''}
                    <table class="table">
                        ${rowsHtml}
                    </table>
                    <div class="footer">
                        Gerado em: ${new Date().toLocaleString('pt-BR')} | Sistema de Planos de Aula
                    </div>
                </body>
                </html>
            `;
        }

        // ================================================================
        // IMPORTAR
        // ================================================================
        function importPlans() {
            document.getElementById('importInput').click();
        }

        function importPlansFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) {
                        throw new Error('Formato inválido: esperado um array.');
                    }

                    const valid = imported.every(p => p.tema !== undefined && p.grupo !== undefined);
                    if (!valid) {
                        throw new Error('Estrutura inválida: campos obrigatórios faltando.');
                    }

                    const newPlans = imported.map(p => ({
                        ...p,
                        id: generateId(),
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString(),
                        outrasInformacoes: p.outrasInformacoes || ''
                    }));

                    plans = [...newPlans, ...plans];
                    saveLocalPlans();
                    renderPlansList();
                    showToast(`${newPlans.length} planos importados com sucesso!`, 'success');

                    if (driveConnected) {
                        saveAllToDrive();
                    }
                } catch (err) {
                    showToast('Erro ao importar: ' + err.message, 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ================================================================
        // UTILITÁRIOS
        // ================================================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        // ================================================================
        // ATALHOS DE TECLADO
        // ================================================================
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                newPlan();
            }
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                const form = document.getElementById('planForm');
                if (form && editingId) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
            if (e.ctrlKey && e.key === 'd') {
                e.preventDefault();
                toggleDriveConfig();
            }
        });

        // ================================================================
        // INICIALIZAÇÃO FINAL
        // ================================================================
        setTimeout(() => {
            if (plans.length > 0 && !currentPlanId) {
                viewPlan(plans[0].id);
            }
        }, 300);

        console.log('📚 Sistema de Planos de Aula - Google Drive (Apps Script)');
        console.log(`📄 ${plans.length} planos disponíveis em ${new Set(plans.map(p => p.grupo)).size} turmas.`);
        console.log('💡 Atalhos: Ctrl+N = Novo | Ctrl+S = Salvar | Ctrl+D = Drive');
        console.log('🔗 URL do Apps Script:', APP_SCRIPT_URL);
    </script>
